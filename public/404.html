<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#0A0A0B" />
    <title>Page Not Found | MarieCoder</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0a0b;
        color: #f0f0f0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }
      main {
        max-width: 560px;
        padding: 48px 24px;
      }
      a {
        color: #00ff66;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
      }
      h1 {
        font-size: clamp(40px, 8vw, 84px);
        line-height: 0.9;
        margin: 0 0 24px;
      }
      p {
        color: rgba(240, 240, 240, 0.68);
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page Not Found</h1>
      <p>This route does not exist on MarieCoder.</p>
      <a href="/">Return Home</a>
    </main>
  </body>
</html>
